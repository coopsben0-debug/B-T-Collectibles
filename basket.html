<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | B&T Collectibles</title>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="logo">B&T COLLECTIBLES</div>
    </header>

    <main class="checkout-card">
        <h3>Your Basket</h3>
        <div id="basket-items"></div>
        <p><strong>Total: £<span id="total-price">0.00</span></strong></p>
        <hr>

        <form id="payment-form">
            <input type="text" id="name" name="name" placeholder="Full Name" required style="width:100%; margin-bottom:10px;">
            <input type="email" id="email" name="email" placeholder="Email Address" required style="width:100%; margin-bottom:10px;">
            <button type="submit" id="submit-btn" style="width:100%; padding:10px; background:#004d40; color:white; border:none; cursor:pointer;">Pay Now</button>
        </form>
    </main>

    <script>
        // 1. Initialize Clients
        const supabase = supabase.createClient('https://whwofdemokzubboptsbu.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indod29mZGVtb2t6dWJib3B0c2J1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTA4NTksImV4cCI6MjA5NTQ4Njg1OX0.78nrkvUO8coSJUWVMYX1UhN-AXBsyWNMhW4OqQTPX_Q');
        const stripe = Stripe('pk_live_51TaPzBCM8FVPdysTNLkHigo5fLGGr9mG6YJJtVXl26AsxiL61DGPwfYXMrmogwI6DYod926w8NCBbesZc8mUuIf000mXmDpwDF');

        // 2. Render Basket
        const basket = JSON.parse(localStorage.getItem('basket') || '[]');
        const container = document.getElementById('basket-items');
        let total = 0;

        basket.forEach((item, index) => {
            total += parseFloat(item.price || 0);
            container.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>${item.title || 'Item'}</span>
                <span>£${parseFloat(item.price).toFixed(2)}</span>
            </div>`;
        });
        document.getElementById('total-price').innerText = total.toFixed(2);

        // 3. Handle Payment Submission
        document.getElementById('payment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Processing...";

            // Save order to Supabase
            await supabase.from('orders').insert([{
                customer_name: document.getElementById('name').value,
                customer_email: document.getElementById('email').value,
                order_details: JSON.stringify(basket),
                status: 'pending'
            }]);

            // Call Cloudflare Worker for Stripe Session
            const response = await fetch('https://bt-collectibles-webhook.coopsben0.workers.dev/create-checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ basket: basket })
            });
            
            const session = await response.json();
            
            // Redirect to Stripe
            await stripe.redirectToCheckout({ sessionId: session.id });
        });
    </script>
</body>
</html>
