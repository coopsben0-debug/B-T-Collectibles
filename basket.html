<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Basket | B&T Collectibles</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f5f5dc; color: #0d3c26; padding: 2rem; }
        .basket-container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 20px; border: 1px solid #dcdcdc; }
        .basket-item { display: flex; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid #eee; }
        .total { font-size: 1.5rem; font-weight: bold; margin-top: 1rem; text-align: right; }
        button { background: #0d3c26; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 6px; cursor: pointer; margin-top: 1rem; }
    </style>
</head>
<body>

    <div class="basket-container">
        <h1>Your Basket</h1>
        <div id="basket-items"></div>
        <div class="total" id="total-price">Total: £0.00</div>
        <button onclick="checkout()">Proceed to Checkout</button>
        <p><a href="art.html">Continue Shopping</a></p>
    </div>

    <script>
        function loadBasket() {
            const basket = JSON.parse(localStorage.getItem('basket') || '[]');
            const container = document.getElementById('basket-items');
            const totalDisplay = document.getElementById('total-price');
            
            if (basket.length === 0) {
                container.innerHTML = '<p>Your basket is empty.</p>';
                return;
            }

            let total = 0;
            container.innerHTML = basket.map((item, index) => {
                total += parseFloat(item.price);
                return `
                    <div class="basket-item">
                        <span>${item.title}</span>
                        <span>£${parseFloat(item.price).toFixed(2)} 
                        <button onclick="removeItem(${index})" style="background:none; color:red; border:none; cursor:pointer;">(Remove)</button></span>
                    </div>`;
            }).join('');
            
            totalDisplay.innerText = `Total: £${total.toFixed(2)}`;
        }

        function removeItem(index) {
            let basket = JSON.parse(localStorage.getItem('basket') || '[]');
            basket.splice(index, 1);
            localStorage.setItem('basket', JSON.stringify(basket));
            loadBasket();
        }

        function checkout() {
            const basket = JSON.parse(localStorage.getItem('basket') || '[]');
            
            if (basket.length === 0) {
                alert("Your basket is empty.");
                return;
            }

            // Logic to direct to the correct Stripe link
            const item = basket[0]; // Simplification: assuming one item for now
            
            if (item.title.toLowerCase().includes('sunset cave')) {
                window.location.href = "https://buy.stripe.com/bJe5kC37IdKofdk0sq7ok00";
            } else {
                alert("Checkout link for this item is not yet configured. Please add the link for: " + item.title);
            }
        }

        window.onload = loadBasket;
    </script>
</body>
</html>
