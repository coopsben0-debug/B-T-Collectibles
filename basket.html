<script>
    // Load and log to console to see if data exists
    const storedData = localStorage.getItem('basket');
    console.log("Data found in localStorage:", storedData);
    
    const basket = JSON.parse(storedData || '[]');
    const container = document.getElementById('basket-items');
    let total = 0;

    if (basket.length > 0) {
        basket.forEach((item, index) => {
            total += parseFloat(item.price || 0);
            container.innerHTML += `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${item.title}</span>
                    <span>£${parseFloat(item.price).toFixed(2)} 
                    <button type="button" onclick="removeItem(${index})" style="background:none; border:none; color:red; cursor:pointer;">x</button></span>
                </div>`;
        });
    } else {
        container.innerHTML = "<p>Your basket is empty. Add items from the Gallery.</p>";
    }
    document.getElementById('total-price').innerText = total.toFixed(2);
    
    // ... rest of your supabase script ...
</script>
