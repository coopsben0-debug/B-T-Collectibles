<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basket | B&T Collectibles</title>
</head>
<body>
    <header>
        <h1>B&T Collectibles Basket</h1>
        <a href="index.html">Back to Home</a>
    </header>

    <main id="main-content">
        <h3>Your Items</h3>
        <div id="basket-items">Loading basket...</div>
    </main>

    <script>
        const basket = JSON.parse(localStorage.getItem('basket') || '[]');
        const container = document.getElementById('basket-items');
        
        if (basket.length === 0) {
            container.innerHTML = "<p>Your basket is empty.</p>";
        } else {
            container.innerHTML = "<ul>" + basket.map(item => {
                // This line looks for 'title' OR 'name', if both are missing it says 'Item'
                const displayName = item.title || item.name || "Art Item";
                const displayPrice = item.price || "0.00";
                return `<li>${displayName} - £${displayPrice}</li>`;
            }).join('') + "</ul>";
        }
    </script>
</body>
</html>
