<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | B&T Atelier</title>
    <style>
        :root { --beige: #F7F4D5; --dark-green: #0A3323; --sage: #839958; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--beige); color: var(--dark-green); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { display: flex; align-items: center; justify-content: space-between; padding: 20px 50px; background: white; border-bottom: 1px solid var(--sage); }
        .back-btn { text-decoration: none; color: var(--sage); font-weight: bold; }
        .brand-title { font-size: 1.5em; font-weight: bold; }
        
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px; }
        .contact-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; max-width: 500px; width: 100%; }
        
        h1 { margin-bottom: 30px; }
        .contact-info { margin: 20px 0; }
        .btn { display: block; padding: 15px; margin: 10px 0; background: var(--sage); color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .btn:hover { background: #6b7f45; }
    </style>
</head>
<body>

<header>
    <a href="art.html" class="back-btn">← Back to Gallery</a>
    <div class="brand-title">B&T Collectibles</div>
    <div></div> </header>

<main>
    <div class="contact-box">
        <h1>Contact & Custom Orders</h1>
        <p>We'd love to hear from you. Reach out for inquiries or to request a custom commission.</p>
        
        <div class="contact-info">
            <p><strong>Email:</strong><br> b-tcollectibles@outlook.com</p>
        </div>

        <a href="mailto:b-tcollectibles@outlook.com?subject=Custom Order Request" class="btn">Request Custom Order</a>
        
        <div style="margin-top: 30px;">
            <p><strong>Follow us:</strong></p>
            <a href="https://www.instagram.com/b.t.collectibles?utm_source=qr" class="btn" style="background: var(--dark-green);">Instagram</a>
            <a href="https://www.tiktok.com/@bt.collectibles?_r=1&_t=ZN-97B5W2Ua8rW" class="btn" style="background: var(--dark-green);">TikTok</a>
        </div>
    </div>
</main>

</body>
</html>
