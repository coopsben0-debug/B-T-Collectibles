<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hobbies | B&T Collectibles</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <a href="index.html" class="nav-button">Home</a>
        <div class="logo">B&T <span>Collectibles</span></div>
        <a href="#basket" class="nav-button">Basket</a>
    </header>

    <main class="gallery-layout">
        <aside>
            <h3 class="sidebar-title">Hobby Categories</h3>
            <nav class="sidebar-nav">
                <button onclick="filterSelection('all')" class="nav-box">All Hobbies</button>
                <button onclick="filterSelection('tcg')" class="nav-box">TCG</button>
                <button onclick="filterSelection('rubik')" class="nav-box">Rubik's Cube</button>
            </nav>
        </aside>

        <section class="gallery-content">
            <div id="tcg" class="filter-section"><h2 class="gallery-title">TCG</h2><div class="product-grid"><div class="product-card"></div></div></div>
            <div id="rubik" class="filter-section"><h2 class="gallery-title">Rubik's Cube</h2><div class="product-grid"><div class="product-card"></div></div></div>
        </section>
    </main>

    <script>
        function filterSelection(c) {
            const sections = document.querySelectorAll('.filter-section');
            sections.forEach(s => s.style.display = (c === 'all' || s.id === c) ? 'block' : 'none');
        }
    </script>
</body>
</html>
