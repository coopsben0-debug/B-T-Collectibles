backend:
  name: github
  repo: coopsben0-debug/B-T-Collectibles
  branch: main

# Required by Decap CMS to function
media_folder: "images/uploads"
public_folder: "/images/uploads"
media_library:
  name: image

collections:
  - name: "art"
    label: "Art"
    folder: "content/art"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Price", name: "price", widget: "number"}
      - {label: "Image", name: "image", widget: "image"}
  - name: "crafts"
    label: "Crafts"
    folder: "content/crafts"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Price", name: "price", widget: "number"}
      - {label: "Image", name: "image", widget: "image"}
  - name: "hobbies"
    label: "Hobbies"
    folder: "content/hobbies"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Price", name: "price", widget: "number"}
      - {label: "Image", name: "image", widget: "image"}
