backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "products"
    label: "Store Products"
    folder: "products"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Product Name", name: "title", widget: "string"}
      - {label: "Price (e.g. £150)", name: "price", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["cooper", "ku", "wood", "stone", "pastel", "miniature", "cards"]}
      - {label: "Product Image", name: "image", widget: "image"}
