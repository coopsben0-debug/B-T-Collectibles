backend:
  name: github
  repo: coopsben0/B-T-Collectibles
  branch: main

# These two sections are required to fix the error in image_e1cc21.png
media_folder: "static/images/uploads"
public_folder: "/images/uploads"

media_library:
  name: image

collections:
  - name: "art"
    label: "Art"
    folder: "content/art"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Price", name: "price", widget: "number"}
      - {label: "Image", name: "image", widget: "image"}
  - name: "crafts"
    label: "Crafts"
    folder: "content/crafts"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Price", name: "price", widget: "number"}
      - {label: "Image", name: "image", widget: "image"}
  - name: "hobbies"
    label: "Hobbies"
    folder: "content/hobbies"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Price", name: "price", widget: "number"}
      - {label: "Image", name: "image", widget: "image"}
