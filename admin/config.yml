# Use the GitHub backend instead of Git Gateway
backend:
  name: github
  repo: coopsben0/B-T-Collectibles # CHANGE THIS if your repo path is different
  branch: main
  base_url: https://api.github.com # Standard GitHub API

collections:
  - name: "art"
    label: "Art"
    folder: "content/art"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Price", name: "price", widget: "number"}
      - {label: "Image", name: "image", widget: "image"}
  - name: "crafts"
    label: "Crafts"
    folder: "content/crafts"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Price", name: "price", widget: "number"}
      - {label: "Image", name: "image", widget: "image"}
  - name: "hobbies"
    label: "Hobbies"
    folder: "content/hobbies"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Price", name: "price", widget: "number"}
      - {label: "Image", name: "image", widget: "image"}
