backend:
  name: github
  repo: coopsben0-debug/B-T-Collectibles
  branch: main
  base_url: https://api.github.com

media_folder: "images/uploads"
public_folder: "images/uploads" # Removed leading slash for better path consistency

collections:
  # Art Collection
  - name: "art"
    label: "Art & Products"
    folder: "products/art"
    create: true
    slug: "{{slug}}"
    format: "yaml"
    extension: "yaml" # Explicitly forces .yaml extension for readability
    fields:
      - {label: "Product Name", name: "title", widget: "string"}
      - {label: "Main Product Image", name: "image", widget: "image"}
      - {label: "Category", name: "category", widget: "select", options: ["B.A. Cooper Signature", "T.L. Ku Signature", "Wood Work", "Miniature", "Stone"]}
      - {label: "Etsy Print Link", name: "print_link", widget: "string", required: false}
      - {label: "Etsy Original Link", name: "original_link", widget: "string", required: false}

  # Library Collection
  - name: "library"
    label: "Library"
    folder: "content/library"
    create: true
    slug: "{{slug}}"
    format: "yaml"
    extension: "yaml" # Explicitly forces .yaml extension for readability
    fields:
      - {label: "Book Title", name: "title", widget: "string"}
      - {label: "Cover Image", name: "image", widget: "image"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Link to Book", name: "book_link", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
