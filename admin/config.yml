backend:
  name: github
  repo: coopsben0-debug/B-T-Collectibles
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "art"
    label: "Art"
    folder: "products/art"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Price", name: "price", widget: "number"}
      - {label: "Image", name: "image", widget: "image"}
      # This dropdown maps directly to the layout sections on your web page
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - {label: "B.A. Cooper Signature", value: "cooper"}
          - {label: "T.L. Ku Signature", value: "tlku"}
          - {label: "Wood Work", value: "woodwork"}
          - {label: "Miniature", value: "miniature"}
          - {label: "Stone", value: "stone"}
