<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Art Gallery | B&T Collectibles</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <a href="index.html">Home</a>
        <div class="logo">B&T Collectibles</div>
        <a href="#basket">Basket</a>
    </header>
    <main class="gallery-layout">
        <aside>
            <h3 class="sidebar-title">Art Categories</h3>
            <nav class="sidebar-nav">
                <button onclick="filterSelection('all')" class="nav-box">All Art</button>
                <button onclick="filterSelection('cooper')" class="nav-box">B.A. Cooper</button>
            </nav>
        </aside>
        <section class="gallery-content">
            <div id="cooper" class="filter-section"><div class="product-grid"><div class="product-card"></div></div></div>
        </section>
    </main>
    <script>
        function filterSelection(c) {
            document.querySelectorAll('.filter-section').forEach(s => s.style.display = (c === 'all' || s.id === c) ? 'block' : 'none');
        }
    </script>
</body>
</html>
