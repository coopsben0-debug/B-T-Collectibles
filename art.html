<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Art Gallery | B&T Collectibles</title>
    <style>
        /* Modern, calm aesthetic */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #fdfaf6; 
            color: #333; 
            margin: 0; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        h1 { color: #004d40; margin-bottom: 40px; }
        .gallery { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 30px; 
            justify-content: center; 
        }
        .product-card { 
            background: white; 
            padding: 20px; 
            width: 280px; 
            text-align: center; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 8px; 
            margin-bottom: 15px; 
        }
        .buy-btn { 
            display: inline-block; 
            padding: 12px 25px; 
            background: #004d40; 
            color: white; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: 600; 
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>Our Art Gallery</h1>
    
    <div class="gallery">
        <!-- Sunset beneath a cave -->
        <div class="product-card">
            <img src="/images/uploads/p4.JPG" alt="Sunset beneath a cave">
            <h3>Sunset beneath a cave</h3>
            <p>£29.99</p>
            <a href="https://buy.stripe.com/28E5kC23EeOs3uC2Ay7ok01" target="_blank" class="buy-btn">Buy Now</a>
        </div>
    </div>
</body>
</html>
