<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Art Gallery | B&T Collectibles</title>
    <style>
        :root {
            --dark-green: #0A3323;
            --moss-green: #839958;
            --beige: #F7F4D5;
            --gold: #C5A059;
        }

        body { 
            font-family: 'Lato', sans-serif; 
            background-color: var(--beige); 
            color: var(--dark-green); 
            margin: 0; 
            display: flex; 
            min-height: 100vh; 
        }

        aside { 
            width: 250px; 
            background: #fff; 
            padding: 2rem; 
            border-right: 1px solid var(--gold); 
        }

        aside h2 { font-family: 'Playfair Display', serif; color: var(--dark-green); margin-bottom: 1.5rem; }
        aside ul { list-style: none; padding: 0; }
        aside li { margin-bottom: 1rem; cursor: pointer; font-weight: 500; transition: 0.3s; }
        aside li:hover { color: var(--moss-green); text-decoration: underline; }

        main { flex: 1; padding: 3rem; }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 3rem; 
            font-family: 'Playfair Display', serif; 
        }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 2rem; }
        
        .product-card { 
            background: #fff; 
            padding: 1.5rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            text-align: center; 
            border: 1px solid #e0e0e0; 
        }

        .product-image-container { width: 100%; height: 200px; margin-bottom: 1rem; overflow: hidden; border-radius: 8px; background: #f0f0f0; }
        .product-image-container img { width: 100%; height: 100%; object-fit: cover; }

        button { 
            background: var(--dark-green); 
            color: white; 
            padding: 0.75rem 1.5rem; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600; 
            margin-top: 1rem; 
            transition: 0.3s; 
        }
        button:hover { background: var(--moss-green); }
    </style>
</head>
<body>

    <aside>
        <h2>Collections</h2>
        <ul id="sidebar-nav">
            <li onclick="filterCategory('All')">All Items</li>
        </ul>
    </aside>

    <main>
        <header>
            <a href="index.html" style="color: var(--dark-green); font-weight: bold; text-decoration: none;">← Back to Home</a>
            <h1>B&T Collectibles</h1>
            <a href="basket.html" style="color: var(--gold); font-weight: bold;">View Basket (<span id="basket-count">0</span>)</a>
        </header>
        <div id="gallery-root" class="product-grid">Loading collection...</div>
    </main>

    <script>
        let allProducts = [];

        async function initGallery() {
            try {
                const apiURL = 'https://api.github.com/repos/coopsben0-debug/B-T-Collectibles/contents/products/art';
                const response = await fetch(apiURL);
                const files = await response.json();
                const mdFiles = files.filter(f => f.name.endsWith('.md'));

                for (const file of mdFiles) {
                    const res = await fetch(file.download_url);
                    const text = await res.text();
                    allProducts.push({
                        title: text.match(/title:\s*["']?([^"'\n]+)/i)?.[1] || "Untitled",
                        price: text.match(/price:\s*["']?([\d.]+)/i)?.[1] || "0.00",
                        image: text.match(/image:\s*["']?([^"'\n]+)/i)?.[1] || "",
                        category: text.match(/category:\s*["']?([^"'\n]+)/i)?.[1] || "General",
                        description: text.match(/description:\s*["']?([^"'\n]+)/i)?.[1] || ""
                    });
                }
                renderProducts(allProducts);
                renderSidebar();
            } catch (e) {
                document.getElementById('gallery-root').innerHTML = "Unable to load products.";
            }
        }

        function renderProducts(products) {
            const root = document.getElementById('gallery-root');
            root.innerHTML = products.length > 0 ? products.map(item => `
                <div class="product-card">
                    <div class="product-image-container"><img src="${item.image}" alt="${item.title}" onerror="this.style.display='none'"></div>
                    <h3>${item.title}</h3>
                    <p style="font-size: 0.9rem; color: #555;">${item.description}</p>
                    <p><strong>£${parseFloat(item.price).toFixed(2)}</strong></p>
                    <button onclick="addToBasket('${item.title}', '${item.price}')">Add to Basket</button>
                </div>`).join('') : '<p>No products found.</p>';
        }

        function renderSidebar() {
            const categories = [...new Set(allProducts.map(p => p.category))];
            const nav = document.getElementById('sidebar-nav');
            categories.forEach(cat => {
                nav.innerHTML += `<li onclick="filterCategory('${cat}')">${cat}</li>`;
            });
        }

        function filterCategory(cat) {
            if (cat === 'All') return renderProducts(allProducts);
            renderProducts(allProducts.filter(p => p.category === cat));
        }

        function addToBasket(title, price) {
            let basket = JSON.parse(localStorage.getItem('basket') || '[]');
            basket.push({ title, price });
            localStorage.setItem('basket', JSON.stringify(basket));
            alert(title + ' added to basket!');
            updateBasketCount();
        }

        function updateBasketCount() {
            document.getElementById('basket-count').innerText = JSON.parse(localStorage.getItem('basket') || '[]').length;
        }

        window.onload = () => { initGallery(); updateBasketCount(); };
    </script>
</body>
</html>
