<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery | B&T Atelier</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #F7F4D5; margin: 0; display: flex; min-height: 100vh; }
        
        /* Sidebar */
        aside { width: 220px; background: #ffffff; padding: 30px; border-right: 1px solid #839958; }
        aside h2 { color: #0A3323; font-size: 1.2em; margin-bottom: 20px; }
        aside a { display: block; margin-bottom: 15px; text-decoration: none; color: #0A3323; transition: color 0.2s; }
        aside a:hover { color: #839958; font-weight: bold; }
        
        /* Gallery */
        main { flex: 1; padding: 40px; }
        h1 { color: #0A3323; margin-bottom: 30px; }
        .gallery { display: flex; flex-wrap: wrap; gap: 30px; }
        
        /* Product Card */
        .product-card { background: white; padding: 20px; width: 260px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        .product-card img { width: 100%; height: 220px; object-fit: cover; border-radius: 4px; margin-bottom: 15px; }
        .product-card h3 { color: #0A3323; font-size: 1.1em; margin: 10px 0; }
        
        /* Buttons */
        .buy-btn { display: block; padding: 10px; color: #F7F4D5; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 0.9em; transition: opacity 0.2s; }
        .buy-btn:hover { opacity: 0.9; }
        .print-btn { background: #839958; }
        .original-btn { background: #0A3323; margin-top: 8px; }
    </style>
</head>
<body>
    <aside>
        <h2>Categories</h2>
        <a href="art.html">All Art</a>
        <a href="#">Paintings</a>
        <a href="#">Miniatures</a>
        <a href="#">Woodwork</a>
    </aside>
    
    <main>
        <h1>Our Collection</h1>
        <div class="gallery">
            
            <div class="product-card">
                <img src="/images/uploads/p1.JPG" alt="Sun sleeps in Japan">
                <h3>Sun sleeps in Japan</h3>
                <div>
                    <a href="https://www.etsy.com/uk/listing/4518128609/the-sun-sleeps-in-japan-aswell" target="_blank" class="buy-btn print-btn">Buy Print</a>
                    <a href="https://www.etsy.com/uk/listing/4518489258/the-sun-sleeps-in-japan-aswell-original" target="_blank" class="buy-btn original-btn">Buy Original</a>
                </div>
            </div>

            <div class="product-card">
                <img src="/images/uploads/p2.JPG" alt="The sun unites the caves and the sea">
                <h3>The sun unites the caves and the sea</h3>
                <div>
                    <a href="https://www.etsy.com/uk/listing/4518576730/the-sun-unites-the-caves-and-the-sea" target="_blank" class="buy-btn print-btn">Buy Print</a>
                    <a href="https://www.etsy.com/uk/listing/4518579531/the-sun-unites-the-caves-and-the-sea-original" target="_blank" class="buy-btn original-btn">Buy Original</a>
                </div>
            </div>

        </div>
    </main>
</body>
</html>
