<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B&T Atelier | Premium Collection</title>
    <style>
        :root { --beige: #F7F4D5; --dark-green: #0A3323; --sage: #839958; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--beige); margin: 0; display: flex; min-height: 100vh; }
        
        aside { width: 240px; background: white; padding: 40px; border-right: 1px solid var(--sage); }
        aside h2 { color: var(--dark-green); font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; }
        aside button { display: block; width: 100%; padding: 10px; margin: 10px 0; border: none; background: none; text-align: left; cursor: pointer; color: var(--dark-green); border-radius: 4px; }
        aside button:hover { background: var(--beige); }

        main { flex: 1; padding: 50px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }
        .product-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.06); transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: 300px; object-fit: cover; border-radius: 8px; }
        .product-card h3 { color: var(--dark-green); margin: 15px 0 5px; }
        .btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; text-align: center; text-decoration: none; font-size: 0.8em; font-weight: bold; border-radius: 6px; }
        .print { background: var(--sage); color: white; }
        .orig { background: var(--dark-green); color: white; }
    </style>
</head>
<body>

<aside>
    <h2>Collection</h2>
    <button onclick="filterSelection('all')">Show All</button>
    <button onclick="filterSelection('B.A. Cooper Signature')">B.A. Cooper Signature</button>
    <button onclick="filterSelection('T.L. Ku Signature')">T.L. Ku Signature</button>
    <button onclick="filterSelection('Wood Work')">Wood Work</button>
    <button onclick="filterSelection('Miniature')">Miniature</button>
    <button onclick="filterSelection('Stone')">Stone</button>
</aside>

<main>
    <div class="gallery" id="gallery">
        <div class="product-card" data-category="B.A. Cooper Signature">
            <img src="/images/uploads/Ocean sunset_upscayl_5x_upscayl-standard-4x.png" alt="Product">
            <h3>Sun Sleeps in Japan</h3>
            <div class="btns">
                <a href="#" class="btn print">Buy Print</a>
                <a href="#" class="btn orig">Buy Original</a>
            </div>
        </div>
    </div>
</main>

<script>
    function filterSelection(c) {
        let cards = document.getElementsByClassName("product-card");
        for (let i = 0; i < cards.length; i++) {
            cards[i].style.display = (c == "all" || cards[i].getAttribute("data-category") == c) ? "block" : "none";
        }
    }
</script>
</body>
</html>
