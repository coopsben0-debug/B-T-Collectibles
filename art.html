---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Art Gallery | B&T Atelier</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #F7F4D5; margin: 0; display: flex; min-height: 100vh; }
        aside { width: 220px; background: #ffffff; padding: 30px; border-right: 1px solid #839958; }
        main { flex: 1; padding: 40px; }
        .gallery { display: flex; flex-wrap: wrap; gap: 30px; }
        .product-card { background: white; padding: 20px; width: 260px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .product-card img { width: 100%; height: 220px; object-fit: cover; border-radius: 4px; }
        .buy-btn { display: block; padding: 10px; color: white; text-decoration: none; border-radius: 4px; margin-top: 5px; }
        .print-btn { background: #839958; }
        .original-btn { background: #0A3323; }
    </style>
</head>
<body>
    <aside>
        <h2>Categories</h2>
        <a href="art.html">All Art</a>
    </aside>
    
    <main>
        <h1>Our Collection</h1>
        <div class="gallery">
            {% for item in site.art %}
            <div class="product-card">
                <img src="{{ item.image }}" alt="{{ item.title }}">
                <h3>{{ item.title }}</h3>
                <a href="{{ item.print_link }}" class="buy-btn print-btn">Buy Print</a>
                <a href="{{ item.original_link }}" class="buy-btn original-btn">Buy Original</a>
            </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
