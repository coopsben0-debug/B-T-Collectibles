<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Art Gallery | B&T Atelier</title>
    <style>
        /* Colour Scheme: Beige background (#F7F4D5), Dark Green (#0A3323) */
        body { font-family: 'Segoe UI', sans-serif; background-color: #F7F4D5; margin: 0; display: flex; min-height: 100vh; }
        
        /* Sidebar Styling */
        aside { width: 220px; background: #ffffff; padding: 30px; border-right: 1px solid #839958; }
        aside h2 { color: #0A3323; font-size: 1.2em; margin-bottom: 20px; }
        aside a { display: block; margin-bottom: 15px; text-decoration: none; color: #0A3323; transition: color 0.2s; }
        aside a:hover { color: #839958; font-weight: bold; }
        
        /* Main Content */
        main { flex: 1; padding: 40px; }
        h1 { color: #0A3323; margin-bottom: 30px; }
        .gallery { display: flex; flex-wrap: wrap; gap: 30px; }
        
        /* Product Card Styling */
        .product-card { background: white; padding: 20px; width: 250px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; margin-bottom: 15px; }
        .product-card h3 { color: #0A3323; font-size: 1.1em; margin: 10px 0; }
        
        .buy-btn { display: inline-block; padding: 12px 20px; background: #0A3323; color: #F7F4D5; text-decoration: none; border-radius: 4px; margin-top: 10px; font-weight: bold; }
        .buy-btn:hover { background: #839958; }
    </style>
</head>
<body>
    <aside>
        <h2>Categories</h2>
        <a href="art.html">All Art</a>
        <a href="#">Paintings</a>
        <a href="#">Miniatures</a>
        <a href="#">Woodwork</a>
    </aside>
    
    <main>

                <a href="https://buy.stripe.com/28E5kC23EeOs3uC2Ay7ok01" target="_blank" class="buy-btn">Buy Now</a>
            </div>

            <!-- Waterfall Valley -->
            <div class="product-card">
                <img src="/images/uploads/p2.JPG" alt="Waterfall Valley">

            <!-- Sun beneath the birds -->

                <h3>Sun beneath the birds</h3>

    </main>
