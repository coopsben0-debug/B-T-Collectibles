<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery | B&T Atelier</title>
    <style>
        :root { --beige: #F7F4D5; --dark-green: #0A3323; --sage: #839958; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--beige); margin: 0; display: flex; min-height: 100vh; }
        aside { width: 240px; background: white; padding: 40px; border-right: 1px solid var(--sage); }
        .logo { width: 100%; max-width: 150px; margin-bottom: 30px; }
        aside h2 { color: var(--dark-green); font-size: 1.1em; text-transform: uppercase; margin-bottom: 20px; }
        aside a { display: block; color: var(--dark-green); text-decoration: none; margin-bottom: 12px; font-weight: 500; }
        main { flex: 1; padding: 50px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }
        .product-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .product-card img { width: 100%; height: 300px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
        .btn { display: block; padding: 12px; text-align: center; text-decoration: none; font-size: 0.85em; font-weight: bold; border-radius: 6px; margin-top: 8px; }
        .print { background: var(--sage); color: white; }
        .orig { background: var(--dark-green); color: white; }
    </style>
</head>
<body>
<aside>
    <img src="images/uploads/logo.jpg" class="logo" alt="B&T Atelier Logo">
    <h2>Categories</h2>
    <a href="#">B.A. Cooper Signature</a>
    <a href="#">T.L. Ku Signature</a>
    <a href="#">Wood Work</a>
    <a href="#">Miniature</a>
    <a href="#">Stone</a>
</aside>
<main>
    <h1>Our Collection</h1>
    <div class="gallery">
        <div class="product-card">
            <img src="images/uploads/shamus.jpeg" alt="Shamus Heaney">
            <h3>Shamus Heaney - Poet Series #1</h3>
            <a href="https://www.etsy.com/uk/listing/4519774908/shamus-heaney-poet-series-1-b-a-cooper" class="btn print">Buy Print</a>
        </div>
        </div>
</main>
</body>
</html>
