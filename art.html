<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Art Gallery | B&T Collectibles</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #fcfcf9; 
            color: #333; 
            margin: 0; 
            padding: 2rem; 
        }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            max-width: 1000px; 
            margin: 0 auto 2rem auto; 
        }

        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 2rem; 
            max-width: 1000px; 
            margin: 0 auto; 
        }

        .product-card { 
            background: #fff; 
            padding: 2rem; 
            border-radius: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            text-align: center;
            border: 1px solid #f0f0f0;
        }

        .product-image-container { 
            width: 100%; 
            margin-bottom: 1.5rem; 
        }

        .product-image-container img { 
            width: 100%; 
            border-radius: 10px; 
            display: block;
        }

        button { 
            background: #0d3c26; 
            color: white; 
            padding: 0.75rem 1.5rem; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>B&T Collectibles</h1>
        <a href="basket.html">View Basket (<span id="basket-count">0</span>)</a>
    </header>

    <main id="gallery-root">
        <div class="product-grid" id="grid">
            <!-- Products loaded by script -->
        </div>
    </main>

    <script>
        // List your files here. 
        const artFiles = ['sunset-cave.md']; 

        async function initGallery() {
            const grid = document.getElementById('grid');
            grid.innerHTML = ''; 

            for (const file of artFiles) {
                try {
                    const response = await fetch(`/content/art/${file}`);
                    const text = await response.text();
                    
                    const title = text.match(/title:\s*["']?([^"'\n]+)/i)?.[1] || "Untitled";
                    const image = text.match(/image:\s*["']?([^"'\n]+)/i)?.[1] || "";
                    const price = text.match(/price:\s*["']?([^"'\n]+)/i)?.[1] || "0.00";

                    grid.innerHTML += `
                        <div class="product-card">
                            <div class="product-image-container">
                                <img src="${image}" alt="${title}" onerror="this.style.display='none'">
                            </div>
                            <h3>${title}</h3>
                            <p>£${price}</p>
                            <button onclick="addToBasket('${title}', '${price}')">Add to Basket</button>
                        </div>`;
                } catch (e) { console.error("Error loading", file); }
            }
        }

        function addToBasket(title, price) {
            let basket = JSON.parse(localStorage.getItem('basket') || '[]');
            basket.push({ title, price });
            localStorage.setItem('basket', JSON.stringify(basket));
            alert(title + ' added to basket!');
            updateBasketCount();
        }

        function updateBasketCount() {
            const basket = JSON.parse(localStorage.getItem('basket') || '[]');
            document.getElementById('basket-count').innerText = basket.length;
        }

        window.onload = () => { initGallery(); updateBasketCount(); };
    </script>
</body>
</html>
