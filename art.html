<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Art Gallery | B&T Collectibles</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .product-card { background: #fff; padding: 1rem; border-radius: 12px; border: 1px solid #eee; }
        .product-image-container { width: 100%; height: 240px; background: #f4f2eb; border-radius: 8px; overflow: hidden; margin-bottom: 1rem; }
        .product-image-container img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <header><h1>B&T Collectibles</h1></header>
    <main class="gallery-layout">
        <section class="gallery-content" id="gallery-root"><p>Loading your collection...</p></section>
    </main>

    <script>
        // List your files here. To make this 100% automatic, you would 
        // normally use a build script to generate this 'artFiles' list.
        const artFiles = ['sunset-cave.md']; 

        async function initGallery() {
            const root = document.getElementById('gallery-root');
            root.innerHTML = '<div class="product-grid" id="grid"></div>';
            const grid = document.getElementById('grid');

            for (const file of artFiles) {
                try {
                    const response = await fetch(`/content/art/${file}`);
                    const text = await response.text();
                    
                    // Simple parser: Extracts data from YAML frontmatter
                    const title = text.match(/title:\s*["']?([^"'\n]+)/i)?.[1] || "Untitled";
                    const image = text.match(/image:\s*["']?([^"'\n]+)/i)?.[1] || "";
                    const price = text.match(/price:\s*["']?([^"'\n]+)/i)?.[1] || "0.00";

                    grid.innerHTML += `
                        <div class="product-card">
                            <div class="product-image-container">
                                <img src="${image}" alt="${title}" onerror="this.style.display='none'">
                            </div>
                            <h4>${title}</h4>
                            <p class="price">£${price}</p>
                        </div>`;
                } catch (e) { console.error("Error loading", file); }
            }
        }
        window.onload = initGallery;
    </script>
</body>
</html>
