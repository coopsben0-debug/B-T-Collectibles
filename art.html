<script>
async function autoLoadProducts() {
    // 1. We assume you save your product files as .json in your products/art folder
    // Replace 'data.json' with your actual index file or use a folder-scan API
    try {
        const response = await fetch('/products/art/data.json'); 
        const products = await response.json();
        const galleryRoot = document.getElementById('gallery-root');

        products.forEach(p => {
            const grid = document.getElementById(`grid-${p.category}`);
            if (grid) {
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="product-image-container">
                            <img src="${p.image}" alt="${p.title}" style="width:100%; height:100%; object-fit:cover;">
                        </div>
                        <h4>${p.title}</h4>
                        <p class="price">£${p.price}</p>
                    </div>`;
            }
        });
    } catch (err) {
        console.log("Waiting for data files to build...");
    }
}

// Initialize on load
window.onload = autoLoadProducts;

// Filtering logic
function filter(c, btn) {
    document.querySelectorAll('.filter-section').forEach(s => s.style.display = (c === 'all' || s.id === c) ? 'block' : 'none');
    document.querySelectorAll('.nav-box').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}
</script>
