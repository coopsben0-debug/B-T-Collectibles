<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Art Gallery | B&T Collectibles</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Essential styles for the grid */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .product-card { background: #fff; padding: 1rem; border-radius: 12px; border: 1px solid #eee; transition: 0.3s; }
        .product-image-container { width: 100%; height: 240px; background: #f4f2eb; border-radius: 8px; overflow: hidden; margin-bottom: 1rem; }
        .product-image-container img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <header>
        <div class="logo">B&T Collectibles</div>
    </header>

    <main class="gallery-layout">
        <aside>
            <h3>Art Categories</h3>
            <nav id="sidebar">
                <button onclick="filter('all', this)" class="nav-box active">All Art</button>
            </nav>
        </aside>

        <section class="gallery-content" id="gallery-root"></section>
    </main>

    <script>
        // 1. Fetch your data from the folder where Sveltia saves your files
        async function loadGallery() {
            // NOTE: Replace 'data.json' with your actual generated data file 
            // or use a script to loop through your /content/art/ markdown files
            const response = await fetch('/products/art/data.json').catch(() => ({json: () => []}));
            const products = await response.json();
            const root = document.getElementById('gallery-root');

            products.forEach(p => {
                root.innerHTML += `
                    <div class="product-card" data-category="${p.category}">
                        <div class="product-image-container">
                            <img src="${p.image}" alt="${p.title}">
                        </div>
                        <h4>${p.title}</h4>
                        <p class="price">£${p.price}</p>
                    </div>`;
            });
        }

        // 2. Simple Filter Function
        function filter(category, btn) {
            document.querySelectorAll('.product-card').forEach(card => {
                card.style.display = (category === 'all' || card.dataset.category === category) ? 'block' : 'none';
            });
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
