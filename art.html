<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Art Gallery | B&T Collectibles</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .product-card { background: #fff; padding: 1rem; border-radius: 12px; border: 1px solid #eee; }
        .product-image-container { width: 100%; height: 240px; background: #f4f2eb; border-radius: 8px; overflow: hidden; margin-bottom: 1rem; }
        .product-image-container img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <header><h1>B&T Collectibles</h1></header>

    <main class="gallery-layout">
        <aside>
            <h3>Art Categories</h3>
            <div id="sidebar"></div>
        </aside>

        <section class="gallery-content" id="gallery-root">
            <p>Loading art...</p>
        </section>
    </main>

    <script>
        async function loadGallery() {
            try {
                // 1. Point this to the correct path where your .json file lives
                const response = await fetch('/products/art/data.json');
                if (!response.ok) throw new Error('Could not find data.json');
                const products = await response.json();
                
                const root = document.getElementById('gallery-root');
                root.innerHTML = ''; // Clear "Loading..."

                products.forEach(p => {
                    root.innerHTML += `
                        <div class="product-card">
                            <div class="product-image-container">
                                <img src="${p.image}" alt="${p.title}" onerror="this.src='fallback.png'">
                            </div>
                            <h4>${p.title}</h4>
                            <p class="price">£${p.price}</p>
                        </div>`;
                });
            } catch (error) {
                console.error("Gallery Error:", error);
                document.getElementById('gallery-root').innerHTML = '<p>Error loading gallery. Check console.</p>';
            }
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
