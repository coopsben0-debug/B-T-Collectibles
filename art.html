<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B&T Atelier | Premium Collection</title>
    <style>
        :root { --beige: #F7F4D5; --dark-green: #0A3323; --sage: #839958; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--beige); margin: 0; display: flex; min-height: 100vh; }
        
        aside { width: 240px; background: white; padding: 40px; border-right: 1px solid var(--sage); }
        aside h2 { color: var(--dark-green); font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; }
        
        main { flex: 1; padding: 50px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }
        .product-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.06); }
        .product-card img { width: 100%; height: 300px; object-fit: cover; border-radius: 8px; }
        .product-card h3 { color: var(--dark-green); margin: 15px 0 5px; }
        
        .btn { display: block; padding: 12px; text-align: center; text-decoration: none; font-size: 0.8em; font-weight: bold; border-radius: 6px; margin-top: 10px; }
        .print { background: var(--sage); color: white; }
        .orig { background: var(--dark-green); color: white; }
    </style>
</head>
<body>

<aside>
    <h2>Collection</h2>
    <div id="categories"></div>
</aside>

<main>
    <h1>Our Collection</h1>
    <div class="gallery" id="gallery">
        </div>
</main>

</body>
</html>
