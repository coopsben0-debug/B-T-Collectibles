<script>
    // 1. Add your filenames here. To make this 100% automatic, 
    // you would normally have a server-side script generate this list.
    const artFiles = ['sunset-cave.md']; 

    async function loadAutomatedGallery() {
        const root = document.getElementById('gallery-root');
        root.innerHTML = ''; 

        for (const file of artFiles) {
            try {
                // 2. Fetch the markdown file saved by your CMS
                const response = await fetch(`/content/art/${file}`);
                if (!response.ok) throw new Error(`Could not load ${file}`);
                
                const text = await response.text();
                
                // 3. Simple parser to extract data from Frontmatter
                // This assumes your CMS saves with 'title:', 'image:', and 'price:'
                const titleMatch = text.match(/title: (.*)/);
                const imageMatch = text.match(/image: (.*)/);
                const priceMatch = text.match(/price: (.*)/);

                if (titleMatch && imageMatch) {
                    const title = titleMatch[1];
                    const image = imageMatch[1];
                    const price = priceMatch ? priceMatch[1] : 'N/A';

                    root.innerHTML += `
                        <div class="product-card">
                            <div class="product-image-container">
                                <img src="${image}" alt="${title}" onerror="this.style.display='none'">
                            </div>
                            <h4>${title}</h4>
                            <p class="price">£${price}</p>
                        </div>`;
                }
            } catch (err) {
                console.error(err);
            }
        }
    }

    window.onload = loadAutomatedGallery;
</script>
