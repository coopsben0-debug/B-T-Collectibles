<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery | B&T Collectibles</title>
    <link rel="stylesheet" href="styles.css"> 
    <style>
        :root { --bg-color: #fbf9f3; --primary-color: #0d3c26; --accent-gold: #b8975a; --text-dark: #2d3732; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-dark); margin: 0; padding: 0; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 3rem; border-bottom: 1px solid rgba(13, 60, 38, 0.1); }
        .logo { font-family: 'Georgia', serif; font-size: 1.75rem; font-weight: bold; color: var(--primary-color); text-transform: uppercase; }
        .gallery-layout { display: grid; grid-template-columns: 260px 1fr; gap: 2.5rem; max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }
        .nav-box { display: block; width: 100%; background: none; border: 1px solid rgba(13, 60, 38, 0.15); padding: 0.85rem 1.2rem; margin-bottom: 0.5rem; cursor: pointer; text-align: left; }
        .nav-box.active { background-color: var(--primary-color); color: white; }
        .filter-section { margin-bottom: 3rem; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .product-card { background: var(--card-bg); padding: 1rem; border-radius: 12px; border: 1px solid #eee; }
        .product-image-container { width: 100%; height: 240px; background-color: #f4f2eb; border-radius: 8px; overflow: hidden; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <header>
        <a href="index.html">Home</a>
        <div class="logo">B&T Collectibles</div>
        <a href="#basket">Basket</a>
    </header>

    <main class="gallery-layout">
        <aside>
            <h3 class="sidebar-title">Art Categories</h3>
            <nav class="sidebar-nav" id="sidebar">
                <button onclick="filter('all', this)" class="nav-box active">All Art</button>
                <button onclick="filter('cooper', this)" class="nav-box">B.A. Cooper Signature</button>
                <button onclick="filter('tlku', this)" class="nav-box">T.L. Ku Signature</button>
                <button onclick="filter('woodwork', this)" class="nav-box">Wood Work</button>
                <button onclick="filter('miniature', this)" class="nav-box">Miniature</button>
                <button onclick="filter('stone', this)" class="nav-box">Stone</button>
            </nav>
        </aside>

        <section class="gallery-content" id="gallery-root">
            </section>
    </main>

    <script>
        // Mock data structure (In a real production app, this fetches your .md files)
        const products = [
            { title: "Sunset Cave", price: "120.00", category: "cooper", image: "/images/uploads/sunset-cave.png" }
        ];

        function renderProducts() {
            const root = document.getElementById('gallery-root');
            const cats = ['cooper', 'tlku', 'woodwork', 'miniature', 'stone'];
            
            cats.forEach(cat => {
                const section = document.createElement('div');
                section.id = cat;
                section.className = 'filter-section';
                section.innerHTML = `<h2 class="section-heading">${cat.toUpperCase()}</h2><div class="product-grid" id="grid-${cat}"></div>`;
                root.appendChild(section);

                const grid = section.querySelector(`#grid-${cat}`);
                products.filter(p => p.category === cat).forEach(p => {
                    grid.innerHTML += `
                        <div class="product-card">
                            <div class="product-image-container"><img src="${p.image}" style="width:100%; height:100%; object-fit:cover;"></div>
                            <h4>${p.title}</h4>
                            <p class="price">£${p.price}</p>
                        </div>`;
                });
            });
        }

        function filter(c, btn) {
            document.querySelectorAll('.filter-section').forEach(s => s.style.display = (c === 'all' || s.id === c) ? 'block' : 'none');
            document.querySelectorAll('.nav-box').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        renderProducts();
    </script>
</body>
</html>
