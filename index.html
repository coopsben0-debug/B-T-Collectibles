<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B&T Collectibles | Studio & Archive</title>
    <!-- Load Supabase Library First -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { border: 1px solid #ccc; padding: 10px; border-radius: 8px; }
        .error { color: red; font-weight: bold; border: 1px solid red; padding: 10px; }
    </style>
</head>
<body>

    <h1>B&T Collectibles</h1>
    <div id="status">Connecting to database...</div>
    <div class="grid" id="product-grid"></div>

    <script>
        // REPLACE THESE WITH YOUR ACTUAL NEW ROTATED KEYS
        const SUPABASE_URL = "https://whwofdemokzubboftsbu.supabase.co";
        const SUPABASE_KEY = "YOUR_NEW_ROTATED_ANON_KEY"; 
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            const statusDiv = document.getElementById('status');
            const { data, error } = await supabase.from('products').select('*');

            if (error) {
                statusDiv.innerHTML = `<div class="error">Database Error: ${error.message}</div>`;
                return;
            }

            statusDiv.innerHTML = "Connected! Loading items...";
            const grid = document.getElementById('product-grid');
            grid.innerHTML = ''; // Clear status

            data.forEach(item => {
                grid.innerHTML += `
                    <div class="card">
                        <h3>${item.title || 'Untitled'}</h3>
                        <p>${item.meta || ''}</p>
                        <p><strong>${item.price || ''}</strong></p>
                    </div>
                `;
            });
            statusDiv.innerHTML = ""; // Clear status on success
        }

        init();
    </script>
</body>
</html>
