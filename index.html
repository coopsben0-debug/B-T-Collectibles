<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B&T Collectibles | Studio & Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #status { padding: 15px; border: 2px solid #333; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    </style>
</head>
<body>

    <h1>B&T COLLECTIBLES</h1>
    <div id="status">Loading...</div>
    <div class="grid" id="product-grid"></div>

    <script>
        const SUPABASE_URL = "https://whwofdemokzubboftsbu.supabase.co";
        const SUPABASE_KEY = "sb_publishable_4Lj1I-_ojQjz59y83eGLqg_iqTpVVRX";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            const statusDiv = document.getElementById('status');
            const grid = document.getElementById('product-grid');
            
            console.log("Attempting Supabase fetch...");
            statusDiv.innerText = "Fetching data from Supabase...";

            try {
                const { data, error } = await supabase.from('products').select('*');
                
                if (error) {
                    statusDiv.innerHTML = "<strong>Error:</strong> " + error.message;
                    return;
                }

                if (!data || data.length === 0) {
                    statusDiv.innerText = "Connected, but the table is empty.";
                    return;
                }

                statusDiv.style.display = 'none';
                grid.innerHTML = data.map(item => `
                    <div class="card">
                        <h3>${item.title || 'Untitled'}</h3>
                        <p>${item.price || ''}</p>
                    </div>
                `).join('');
                
            } catch (err) {
                statusDiv.innerText = "Critical Failure: " + err.message;
            }
        }

        init();
    </script>
</body>
</html>
