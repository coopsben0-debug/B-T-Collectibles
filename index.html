<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B&T Collectibles — Studio Hub</title>
    
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self'; 
        script-src 'self' 'unsafe-inline' https://js.stripe.com https://b.stripe.com https://payhip.com; 
        style-src 'self' 'unsafe-inline'; 
        img-src 'self' data: https://images.unsplash.com https://*.stripe.com https://payhip.com; 
        connect-src 'self' https://api.stripe.com; 
        frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://payhip.com;
        frame-ancestors 'none';
    ">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="no-referrer-when-downgrade">

    <style>
        :root {
            --clr-dark-green: #0A3323;
            --clr-moss-green: #839958;
            --clr-beige: #F7F4D5;
            --clr-rosy-brown: #D3968C;
            --clr-midnight: #105666;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--clr-beige);
            color: var(--clr-dark-green);
            font-family: 'Georgia', serif;
            line-height: 1.6;
        }

        /* 🌸 MASTER SYSTEM-WIDE TOP HEADER (LOCKED PINK-BEIGE) */
        .brand-header-banner {
            background-color: var(--clr-beige);
            padding: 2rem 4rem 1.5rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(131, 153, 88, 0.2);
        }

        /* Top-Left Logo Configuration Frame */
        .studio-logo-frame {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            text-decoration: none;
            color: var(--clr-dark-green);
        }
        
        .studio-logo-frame .logo-graphic-img {
            height: 60px;
            width: 60px;
            object-fit: contain;
        }

        .logo-meta-title h1 { 
            font-size: 1.8rem; 
            letter-spacing: 3px; 
            font-weight: 400; 
            text-transform: uppercase; 
            line-height: 1.1;
        }
        .logo-meta-title p { 
            font-family: sans-serif; 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            opacity: 0.8; 
            margin-top: 4px; 
        }

        .right-utilities-gate {
            display: flex;
            align-items: center;
            gap: 2rem;
            font-family: sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .util-link { text-decoration: none; color: var(--clr-dark-green); font-weight: bold; }
        .basket-pill { background-color: var(--clr-dark-green); color: var(--clr-beige); padding: 0.3rem 0.7rem; border-radius: 50px; font-size: 0.75rem; margin-left: 0.3rem; }

        /* 🗺️ MASTER NAVIGATION CONTROLS BAR */
        .navigation-routing-bar {
            background-color: var(--clr-beige);
            padding: 1.5rem 4rem;
            border-bottom: 1px solid rgba(131, 153, 88, 0.15);
            text-align: center;
        }
        
        .tab-link-group { 
            display: flex; 
            justify-content: center; 
            gap: 3rem; 
        }
        
        .tab-trigger {
            text-decoration: none; 
            font-family: sans-serif; 
            font-size: 0.85rem;
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: bold;
            color: var(--clr-dark-green); 
            padding-bottom: 0.5rem;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .tab-trigger:hover, .tab-trigger.active { 
            color: var(--clr-dark-green);
            border-bottom-color: var(--clr-dark-green);
        }

        /* CONTENT DISPLAY ZONE */
        .page-content-wrapper {
            padding: 3rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-editorial-intro {
            text-align: center;
            font-style: italic;
            font-size: 1.15rem;
            color: var(--clr-midnight);
            margin-bottom: 2.5rem;
        }

        .sorting-dashboard-bar {
            margin-bottom: 2.5rem;
            background: rgba(131, 153, 88, 0.08);
            padding: 1rem 1.5rem;
            border-radius: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sorting-dashboard-bar span { font-family: sans-serif; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .native-select-input {
            padding: 0.5rem 1rem; font-family: sans-serif; font-size: 0.8rem;
            background: #ffffff; color: var(--clr-dark-green);
            border: 1px solid var(--clr-moss-green); outline: none; border-radius: 2px;
        }

        .catalog-showcase-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
        }

        .craft-card {
            background: #ffffff;
            border: 1px solid rgba(131, 153, 88, 0.15);
            border-radius: 4px; padding: 1.2rem;
            display: flex; flex-direction: column;
            transition: transform 0.2s ease;
        }
        .craft-card:hover { transform: translateY(-4px); }

        .card-photo-frame {
            width: 100%; 
            aspect-ratio: 1 / 1; 
            overflow: hidden;
            border-radius: 2px; 
            margin-bottom: 1.2rem;
            background-color: rgba(131, 153, 88, 0.05);
        }
        .card-photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .card-tag-badge {
            display: inline-block; font-family: sans-serif; font-size: 0.65rem;
            text-transform: uppercase; letter-spacing: 1px; background: var(--clr-rosy-brown);
            color: white; padding: 0.25rem 0.6rem; border-radius: 2px; margin-bottom: 0.6rem;
            align-self: flex-start; font-weight: bold;
        }
        .card-meta-line { font-family: sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; margin-bottom: 0.3rem; }
        .card-product-title { font-size: 1.2rem; font-weight: 400; margin-bottom: 0.6rem; line-height: 1.4; color: var(--clr-dark-green); min-height: 3.2rem; }
        .card-product-price { font-family: sans-serif; font-size: 1.05rem; font-weight: bold; margin-bottom: 1.2rem; }
        
        .card-action-trigger {
            display: block; width: 100%; text-align: center; background: transparent;
            color: var(--clr-dark-green); border: 1.5px solid var(--clr-dark-green);
            padding: 0.8rem; text-decoration: none; font-family: sans-serif;
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px;
            font-weight: bold; margin-top: auto; cursor: pointer; transition: all 0.2s ease;
        }
        .card-action-trigger:hover { background: var(--clr-dark-green); color: var(--clr-beige); }
    </style>
</head>
<body>

    <header class="brand-header-banner">
        <a href="index.html" class="studio-logo-frame">
            <img src="2.jpg" alt="B&T Collectibles Logo" class="logo-graphic-img">
            <div class="logo-meta-title">
                <h1>B&T Collectibles</h1>
                <p>Studio & Archive Hub</p>
            </div>
        </a>
        
        <div class="right-utilities-gate">
            <a href="#" class="util-link">Sign In / Register</a>
            <a href="#" class="util-link payhip-open-cart">Studio Basket <span class="basket-pill payhip-cart-count">0</span></a>
        </div>
    </header>

    <nav class="navigation-routing-bar">
        <div class="tab-link-group">
            <a href="index.html" class="tab-trigger active">View All Hub</a>
            <a href="art.html" class="tab-trigger">Art Drops</a>
            <a href="handcrafts.html" class="tab-trigger">Project Kits</a>
            <a href="hobbies.html" class="tab-trigger">Hobbies & Vault</a>
        </div>
    </nav>

    <div class="page-content-wrapper">
        <p class="section-editorial-intro">Handcrafted watercolor drops, creative project kits, and curated trading archives</p>

        <div class="sorting-dashboard-bar">
            <div><span>Main Hub Showcase</span></div>
            <div>
                <select class="native-select-input" id="price-sort-engine" onchange="processSortExecution()">
                    <option value="featured">Sort: Featured Collection</option>
                    <option value="low-high">Price: Low to High</option>
                    <option value="high-low">Price: High to Low</option>
                </select>
            </div>
        </div>

        <main class="catalog-showcase-grid" id="master-catalog-display-target">
            </main>
    </div>

    <script>
        const masterDatabase = [
            { id: 1, price: 150.00, title: 'B.A. Cooper Signature Collection: Custom Portrait Drop', tag: 'Original Drop', label: 'B.A. Cooper Signature Line', img: '5.JPG' },
            { id: 2, price: 125.00, title: 'T.L. Ku Signature Collection: Fine Art Portrait Drop', tag: 'Watercolor Original', label: 'T.L. Ku Signature Collection', img: '6.PNG' },
            { id: 3, price: 175.00, title: 'B&T Signature Collection: Custom Couple Portrait Canvas', tag: 'Wood Studio', label: 'Wooden Carvings', img: '7.PNG' },
            { id: 4, price: 18.00, title: 'Earthy Initial Clay Jewelry Dish', tag: 'Wood Burned', label: 'Wooden Pyrography', img: '2.jpg' }
        ];

        let activeInventory = [...masterDatabase];

        document.addEventListener("DOMContentLoaded", () => { renderCatalogDisplayGrid(); });

        function processSortExecution() {
            const sortingRule = document.getElementById('price-sort-engine').value;
            if (sortingRule === 'low-high') activeInventory.sort((a, b) => a.price - b.price);
            else if (sortingRule === 'high-low') activeInventory.sort((a, b) => b.price - a.price);
            else activeInventory.sort((a, b) => a.id - b.id);
            renderCatalogDisplayGrid();
        }

        function renderCatalogDisplayGrid() {
            const targetsNode = document.getElementById('master-catalog-display-target');
            targetsNode.innerHTML = ''; 
            activeInventory.forEach(item => {
                const card = document.createElement('div');
                card.className = 'craft-card';
                card.innerHTML = `
                    <div class="card-photo-frame"><img src="${item.img}" alt="${item.title}" onerror="this.src='2.jpg';"></div>
                    <span class="card-tag-badge">${item.tag}</span>
                    <p class="card-meta-line">${item.label}</p>
                    <h4 class="card-product-title">${item.title}</h4>
                    <p class="card-product-price">£${item.price.toFixed(2)}</p>
                    <button class="card-action-trigger payhip-buy-button">Add to Basket</button>
                `;
                targetsNode.appendChild(card);
            });
        }
    </script>
    <script type="text/javascript" src="https://payhip.com/payhip.js?v=24842"></script>
</body>
</html>
