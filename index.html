<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B&T Collectibles — Studio Hub</title>
    
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self'; 
        script-src 'self' 'unsafe-inline' https://js.stripe.com https://b.stripe.com; 
        style-src 'self' 'unsafe-inline'; 
        img-src 'self' data: https://images.unsplash.com https://*.stripe.com; 
        connect-src 'self' https://api.stripe.com; 
        frame-src 'self' https://js.stripe.com https://hooks.stripe.com;
        frame-ancestors 'none';
    ">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="no-referrer-when-downgrade">

    <style>
        /* Modern Reset and Water Lily Pond Color System */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-color: #F7F4D5;        /* Warm Lily Beige */
            --text-main: #0A3323;       /* Deep Pond Dark Green */
            --accent-moss: #839958;     /* Fresh Willow Moss Green */
            --accent-rose: #D3968C;     /* Antique Rosy Brown Blossom */
            --accent-midnight: #105666; /* Deep Midnight Teal */
            --card-bg: #ffffff;
        }

        body { 
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Georgia', serif;
            line-height: 1.6;
            padding: 2rem;
            padding-bottom: 7rem; /* Room for fixed basket */
        }

        header {
            text-align: center;
            padding: 4rem 0 2rem 0;
            border-bottom: 1px solid rgba(10, 51, 35, 0.08);
            max-width: 1200px;
            margin: 0 auto 2rem auto;
        }

        /* 🖼️ The Clean B&T Logo Box Frame */
        .studio-logo-container {
            display: inline-block;
            border: 1px solid var(--text-main);
            padding: 1.2rem 3.5rem;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .studio-logo-container::after {
            content: '';
            position: absolute;
            top: 3px; left: 3px; right: 3px; bottom: 3px;
            border: 1px solid var(--accent-moss);
            pointer-events: none;
        }

        .studio-logo-container h1 {
            font-size: 3.2rem;
            font-weight: 400;
            letter-spacing: 3px;
            line-height: 1;
            margin-bottom: 0.1rem;
            text-transform: uppercase;
        }

        .studio-logo-container span {
            font-family: sans-serif;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--accent-midnight);
            display: block;
        }

        header p {
            font-style: italic;
            color: var(--accent-midnight);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        /* 🗺️ Main Navigation Bars: ART, KITS, HOBBIES */
        nav { 
            display: flex; 
            justify-content: center; 
            gap: 3rem; 
            flex-wrap: wrap; 
        }
        nav a { 
            text-decoration: none; 
            font-family: sans-serif; 
            font-size: 0.85rem; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            color: var(--text-main);
            font-weight: bold;
            opacity: 0.8;
            transition: all 0.2s ease; 
        }
        nav a:hover, nav a.active { 
            color: var(--accent-midnight); 
            opacity: 1; 
            border-bottom: 2px solid var(--accent-midnight);
            padding-bottom: 4px;
        }

        /* 🎛️ Interactive Controls Panel (Sorting & Filtering) */
        .controls-wrapper {
            max-width: 1200px;
            margin: 2rem auto;
            background-color: rgba(131, 153, 88, 0.06);
            border: 1px solid rgba(10, 51, 35, 0.05);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-family: sans-serif;
            font-size: 0.85rem;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--accent-moss);
            color: var(--text-main);
            padding: 0.4rem 1rem;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .filter-btn.active, .filter-btn:hover {
            background-color: var(--text-main);
            color: var(--bg-color);
            border-color: var(--text-main);
        }

        .sort-select {
            padding: 0.4rem 1rem;
            font-family: sans-serif;
            font-size: 0.8srem;
            color: var(--text-main);
            background-color: var(--bg-color);
            border: 1px solid var(--accent-moss);
            outline: none;
            cursor: pointer;
        }

        /* 🛍️ Dynamic Product Display Grid */
        .collection-grid {
            max-width: 1200px;
            margin: 0 auto 4rem auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 3rem;
        }

        .product-card { 
            background: transparent; 
            transition: transform 0.3s ease; 
            display: flex;
            flex-direction: column;
        }
        .product-card:hover { transform: translateY(-5px); }

        .image-container {
            width: 100%;
            aspect-ratio: 4 / 5;
            background-color: rgba(131, 153, 88, 0.12);
            overflow: hidden;
            margin-bottom: 1.2rem;
            border: 1px solid rgba(10, 51, 35, 0.05);
        }

        .image-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .badge-tag {
            display: inline-block;
            font-family: sans-serif;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background-color: var(--accent-rose);
            color: #fff;
            padding: 0.2rem 0.6rem;
            margin-bottom: 0.6rem;
            border-radius: 2px;
            align-self: flex-start;
        }

        .artist-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent-moss); margin-bottom: 0.3rem; font-weight: bold; }
        .product-title { font-size: 1.25rem; font-weight: 400; margin-bottom: 0.3rem; color: var(--text-main); minimum-height: 2.8rem; }
        .product-price { font-size: 1.1rem; margin-bottom: 1.2rem; font-family: sans-serif; font-weight: bold; }

        .buy-btn {
            display: inline-block;
            width: 100%;
            text-align: center;
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-main);
            text-decoration: none;
            padding: 0.9rem;
            font-family: sans-serif;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            cursor: pointer;
            margin-top: auto;
        }
        .buy-btn:hover { background-color: var(--accent-midnight); color: var(--bg-color); border-color: var(--accent-midnight); }

        /* 🛒 Fixed Corner Anchor Basket (Showing 0) */
        .fixed-basket-float {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: var(--text-main);
            color: var(--bg-color);
            padding: 1rem 1.8rem;
            border-radius: 50px;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 8px 24px rgba(10, 51, 35, 0.25);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            z-index: 9999;
            transition: all 0.2s ease;
            border: 1px solid var(--accent-moss);
        }
        .fixed-basket-float:hover { background-color: var(--accent-midnight); transform: translateY(-3px); }
        .basket-count-badge { background-color: var(--accent-rose); color: white; font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="studio-logo-container">
            <h1>B&T</h1>
            <span>Collectibles</span>
        </div>
        <p>Handcrafted watercolor drops, creative project kits, and curated trading archives</p>
        
        <nav>
            <a href="#" class="active" onclick="filterCategory('all')">View All Hub</a>
            <a href="#" onclick="filterCategory('art')">Art</a>
            <a href="#" onclick="filterCategory('kits')">Kits</a>
            <a href="#" onclick="filterCategory('hobbies')">Hobbies</a>
        </nav>
    </header>

    <div class="controls-wrapper">
        <div class="filter-group">
            <span>Section:</span>
            <button class="filter-btn active" id="btn-all" onclick="filterCategory('all')">All</button>
            <button class="filter-btn" id="btn-art" onclick="filterCategory('art')">Art</button>
            <button class="filter-btn" id="btn-kits" onclick="filterCategory('kits')">Kits</button>
            <button class="filter-btn" id="btn-hobbies" onclick="filterCategory('hobbies')">Hobbies</button>
        </div>
        
        <div>
            <select class="sort-select" id="sort-dropdown" onchange="sortProducts()">
                <option value="default">Sort: Default Featured</option>
                <option value="low-high">Price: Low to High</option>
                <option value="high-low">Price: High to Low</option>
            </select>
        </div>
    </div>

    <div class="collection-grid" id="product-grid-container">
        </div>

    <a href="#" class="fixed-basket-float payhip-open-cart">
        <span>Studio Basket</span>
        <span class="basket-count-badge payhip-cart-count">0</span>
    </a>

    <script>
        // Core Memory Database for your notebook items across Art, Kits, and Hobbies
        const studioInventory = [
            { id: 1, section: 'art', price: 145.00, title: 'Serene Waterlily Pond Original Canvas', tag: 'Watercolour Drop', label: 'Signature Original', img: 'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=500', link: 'YOUR_STRIPE_OR_PAYHIP_LINK' },
            { id: 2, section: 'art', price: 15.00, title: 'Waterlily Pond Landscape Replica Print (A4)', tag: 'Studio Print', label: 'Matte Finish Replication', img: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500', link: 'YOUR_STRIPE_OR_PAYHIP_LINK' },
            { id: 3, section: 'kits', price: 18.00, title: 'Personalised Clay Jewelry Dish Kit', tag: 'Earthen Clay', label: 'Letter Stamped Studio', img: 'https://images.unsplash.com/photo-1578749556568-bc2c40e68b61?w=500', link: 'YOUR_STRIPE_OR_PAYHIP_LINK' },
            { id: 4, section: 'kits', price: 55.00, title: 'Wildflower Stitch Cuff Embroidery Denim', tag: 'Hand Embroidered', label: 'Upcycled Sewing Kits', img: 'https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0?w=500', link: 'YOUR_STRIPE_OR_PAYHIP_LINK' },
            { id: 5, section: 'hobbies', price: 12.00, title: 'Premium Matte 3x3 Smooth Speedcube', tag: 'Mind Game', label: 'Dexterity Focus Mod', img: 'https://images.unsplash.com/photo-1591115765373-5207764f72e7?w=500', link: 'YOUR_STRIPE_OR_PAYHIP_LINK' },
            { id: 6, section: 'hobbies', price: 4.50, title: 'Pokémon TCG: Sealed Factory Booster Pack', tag: 'TCG Vault', label: 'Collective Archive Card', img: 'https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=500', link: 'YOUR_STRIPE_OR_PAYHIP_LINK' }
        ];

        let activeFilter = 'all';

        // Startup Bootstrapper
        document.addEventListener("DOMContentLoaded", () => {
            renderActiveGrid(studioInventory);
        });

        // Category Filter Switcher Engine
        function filterCategory(category) {
            activeFilter = category;
            
            // Update filter buttons styling states
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${category}`).classList.add('active');

            // Synchronize top navigation styling states
            document.querySelectorAll('nav a').forEach(navLink => {
                if(navLink.innerText.toLowerCase().includes(category) || (category === 'all' && navLink.innerText.toLowerCase().includes('hub'))) {
                    navLink.className = 'active';
                } else {
                    navLink.className = 'inactive';
                }
            });

            sortProducts(); // Chain sorting filters
        }

        // Processing Sort Requests
        function sortProducts() {
            let itemsToProcess = [...studioInventory];
            
            // Apply category filter step first
            if (activeFilter !== 'all') {
                itemsToProcess = itemsToProcess.filter(item => item.section === activeFilter);
            }

            // Apply Sort Order Parameters
            const sortingRule = document.getElementById('sort-dropdown').value;
            if (sortingRule === 'low-high') {
                itemsToProcess.sort((a, b) => a.price - b.price);
            } else if (sortingRule === 'high-low') {
                itemsToProcess.sort((a, b) => b.price - a.price);
            }

            renderActiveGrid(itemsToProcess);
        }

        // Render Cards Matrix to Output Target
        function renderActiveGrid(productsList) {
            const gridContainer = document.getElementById('product-grid-container');
            gridContainer.innerHTML = ''; // Flush layout buffer

            productsList.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="image-container">
                        <img src="${product.img}" alt="${product.title}">
                    </div>
                    <div class="product-meta">
                        <span class="badge-tag">${product.tag}</span>
                        <p class="artist-label">${product.label}</p>
                        <h3 class="product-title">${product.title}</h3>
                        <p class="product-price">£${product.price.toFixed(2)}</p>
                        <a href="${product.link}" class="buy-btn payhip-buy-button">Add to Basket</a>
                    </div>
                `;
                gridContainer.appendChild(card);
            });
        }
    </script>
    
    <script type="text/javascript" src="https://payhip.com/payhip.js?v=24842"></script>
</body>
</html>
