<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B&T Collectibles | Studio & Archive</title>
    <style>
        /* Color Palette & Base Styles */
        :root { 
            --bg-color: #F8E8E8; /* Pink Beige Base */
            --glass-bg: rgba(255, 255, 255, 0.4);
            --accent-art: #B8A8A8; 
            --accent-hand: #D8C8C8;
            --accent-hobby: #E8D8D8;
        }
        body { background-color: var(--bg-color); font-family: 'Georgia', serif; color: #333; margin: 0; padding: 0; }
        
        /* Centralized Header/Logo */
        .hero { text-align: center; padding: 100px 20px; }
        .logo { font-size: 3rem; letter-spacing: 0.2rem; margin-bottom: 10px; }
        
        /* Glassmorphism Section Cards */
        .section-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; padding: 40px; max-width: 1000px; margin: auto; }
        .card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(10px); 
            padding: 40px; 
            text-align: center; 
            border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-10px); }
    </style>
</head>
<body>

    <div class="hero">
        <h1 class="logo">B&T COLLECTIBLES</h1>
        <p>Studio & Archive</p>
    </div>

    <div class="section-grid">
        <div class="card" style="border-top: 5px solid var(--accent-art);">
            <h2>Art</h2>
            <p>Inca Paintings & Originals</p>
        </div>
        <div class="card" style="border-top: 5px solid var(--accent-hand);">
            <h2>Handcrafts</h2>
            <p>Curated Works</p>
        </div>
        <div class="card" style="border-top: 5px solid var(--accent-hobby);">
            <h2>Hobbies</h2>
            <p>Selected Archive</p>
        </div>
    </div>

</body>
</html>
