<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B&T Collectibles | Studio & Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Georgia', serif; background-color: #FDFBF7; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2.5rem; }
        .card { background: #fff; padding: 1.2rem; border-radius: 8px; border: 1px solid rgba(0,0,0,0.05); }
        #admin-panel { display: none; margin-bottom: 30px; padding: 20px; border: 1px solid #333; }
    </style>
</head>
<body>

    <header>
        <h1>B&T COLLECTIBLES</h1>
        <button onclick="toggleAdmin()">Admin Login</button>
    </header>

    <!-- Admin Section -->
    <div id="admin-panel">
        <h3>Add New Painting</h3>
        <input type="text" id="title" placeholder="Title">
        <input type="text" id="price" placeholder="Price">
        <button onclick="addItem()">Upload to Archive</button>
    </div>

    <div id="product-grid" class="grid"></div>

    <script>
        const supabase = window.supabase.createClient("https://whwofdemokzubboftsbu.supabase.co", "sb_publishable_4Lj1I-_ojQjz59y83eGLqg_iqTpVVRX");

        async function fetchProducts() {
            const { data } = await supabase.from('products').select('*');
            const grid = document.getElementById('product-grid');
            grid.innerHTML = data.map(item => `
                <div class="card">
                    <h3>${item.title}</h3>
                    <p>${item.price}</p>
                </div>
            `).join('');
        }

        function toggleAdmin() {
            // Placeholder for Auth Logic
            document.getElementById('admin-panel').style.display = 'block';
        }

        async function addItem() {
            const title = document.getElementById('title').value;
            const price = document.getElementById('price').value;
            await supabase.from('products').insert([{ title, price }]);
            fetchProducts();
        }

        fetchProducts();
    </script>
</body>
</html>
