<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B&T Collectibles | Studio & Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #FDFBF7;
            --accent: #2A3B35;
            --soft: #E8E3D9;
            --text: #1A1A1A;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        /* Glassmorphism Header */
        header { 
            padding: 2rem 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            backdrop-filter: blur(10px); 
            background: var(--glass);
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; color: var(--accent); }

        .nav-bar { display: flex; gap: 2rem; padding: 2rem 5%; justify-content: center; }
        .tab { cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; color: #888; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 2rem; 
            padding: 2rem 5%; 
        }

        .card { 
            background: #fff; 
            padding: 1rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; border-radius: 8px; height: 300px; object-fit: cover; }
        
        button { cursor: pointer; padding: 0.8rem 1.5rem; border: none; background: var(--accent); color: white; border-radius: 6px; }
    </style>
</head>
<body>

<header>
    <div class="logo">B&T COLLECTIBLES</div>
    <div>
        <button onclick="toggleModal('login-modal')">Admin Access</button>
    </div>
</header>

<div class="nav-bar">
    <div class="tab active" onclick="filterItems('All')">All</div>
    <div class="tab" onclick="filterItems('Art')">Art</div>
    <div class="tab" onclick="filterItems('Crafts')">Crafts</div>
</div>

<div class="grid" id="product-grid">
    </div>

<div id="login-modal" style="display:none; position:fixed; top:30%; left:35%; background:#fff; padding:2rem; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.2);">
    <input type="password" id="pass" placeholder="Enter Access Key"><br><br>
    <button onclick="checkAccess()">Sign In</button>
</div>

<script>
    const SUPABASE_URL = "https://whwofdemokzubboftsbu.supabase.co";
    const SUPABASE_KEY = "sb_publishable_4Lj1I-_ojQjz59y83eGLqg_iqTpVVRX";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadItems() {
        const { data, error } = await supabase.from('products').select('*');
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';
        data.forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${item.img}" alt="${item.title}">
                    <h3>${item.title}</h3>
                    <p>${item.price}</p>
                </div>
            `;
        });
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = m.style.display === 'none' ? 'block' : 'none';
    }

    function checkAccess() {
        const p = document.getElementById('pass').value;
        if(p === 'thasia') {
            alert('Welcome, Admin');
            toggleModal('login-modal');
        } else {
            alert('Access Denied');
        }
    }

    window.onload = loadItems;
</script>
</body>
</html>
