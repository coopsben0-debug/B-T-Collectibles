<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B&T Collectibles | Debugging</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #status { padding: 15px; border: 2px solid #333; margin-bottom: 20px; background: #f9f9f9; }
    </style>
</head>
<body>

    <h1>B&T COLLECTIBLES</h1>
    <div id="status">Attempting to connect...</div>

    <script>
        const SUPABASE_URL = "https://whwofdemokzubboftsbu.supabase.co";
        const SUPABASE_KEY = "sb_publishable_4Lj1I-_ojQjz59y83eGLqg_iqTpVVRX";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function debugConnection() {
            const statusDiv = document.getElementById('status');
            
            try {
                // We perform a simple fetch
                const { data, error } = await supabase.from('products').select('*');
                
                if (error) {
                    statusDiv.innerHTML = "<strong>Supabase Error:</strong> " + error.message;
                    console.error("Full Error:", error);
                    return;
                }

                if (!data) {
                    statusDiv.innerText = "Connected, but no data returned.";
                    return;
                }

                statusDiv.innerText = "Success! Loaded " + data.length + " items.";
                console.log("Data loaded successfully:", data);
                
            } catch (err) {
                statusDiv.innerText = "Fatal Error: " + err.message;
            }
        }

        debugConnection();
    </script>
</body>
</html>
