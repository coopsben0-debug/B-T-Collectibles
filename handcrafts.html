<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Kits — B&T Collectibles</title>
    <style>
        :root {
            --clr-dark-green: #0A3323;
            --clr-moss-green: #839958;
            --clr-beige: #F7F4D5;
            --clr-rosy-brown: #D3968C;
            --clr-midnight: #105666;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--clr-beige);
            color: var(--clr-dark-green);
            font-family: 'Georgia', serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .brand-hero-panel {
            background-color: var(--clr-beige);
            padding: 3.5rem 2rem 2rem 2rem;
            text-align: center;
        }

        .logo-img { height: 120px; width: 120px; object-fit: contain; margin-bottom: 1.5rem; }
        .brand-title { font-size: 2.4rem; letter-spacing: 4px; font-weight: 400; text-transform: uppercase; margin-bottom: 0.5rem; }
        .brand-tagline { font-style: italic; font-size: 1.1rem; color: var(--clr-midnight); opacity: 0.9; }

        .navigation-routing-bar {
            background-color: var(--clr-beige);
            padding: 1.5rem 2rem;
            border-top: 1px solid rgba(131, 153, 88, 0.2);
            border-bottom: 1px solid rgba(131, 153, 88, 0.2);
            text-align: center;
        }
        .tab-link-group { display: flex; justify-content: center; gap: 3rem; flex-wrap: wrap; }
        .tab-trigger { text-decoration: none; font-family: sans-serif; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; color: var(--clr-dark-green); padding-bottom: 0.5rem; border-bottom: 2px solid transparent; }
        .tab-trigger:hover, .tab-trigger.active { border-bottom-color: var(--clr-dark-green); }

        /* 🌿 MOSS CRAFT TRANSITION ZONE */
        .dynamic-zone {
            flex: 1;
            background-color: var(--clr-moss-green);
            color: var(--clr-beige);
            padding: 5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .placeholder-box {
            border: 1px dashed rgba(247, 244, 213, 0.4);
            padding: 4rem;
            border-radius: 4px;
            max-width: 600px;
        }

        .placeholder-box h2 {
            font-weight: 400;
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--clr-beige);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <header class="brand-hero-panel">
        <img src="2.jpg" alt="B&T Collectibles Logo" class="logo-img">
        <h1 class="brand-title">B&T Collectibles</h1>
        <p class="brand-tagline">Handmade studio creations, embroidery sets, and clay material assemblies</p>
    </header>

    <nav class="navigation-routing-bar">
        <div class="tab-link-group">
            <a href="index.html" class="tab-trigger">View All Hub</a>
            <a href="art.html" class="tab-trigger">Art Drops</a>
            <a href="handcrafts.html" class="tab-trigger active">Project Kits</a>
            <a href="hobbies.html" class="tab-trigger">Hobbies & Vault</a>
        </div>
    </nav>

    <main class="dynamic-zone">
        <div class="placeholder-box">
            <h2>Studio Project Kits</h2>
            <p>Ready for staging. Your custom hand-assembled crafting kits and design runs will appear here.</p>
        </div>
    </main>

</body>
</html>
