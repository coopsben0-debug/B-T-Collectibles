<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kits & Crafts | B&T Collectibles</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <a href="index.html" class="nav-button">Home</a>
        <div class="logo">B&T <span>Collectibles</span></div>
        <a href="#basket" class="nav-button">Basket</a>
    </header>

    <main class="gallery-layout">
        <aside>
            <h3 class="sidebar-title">Kit Categories</h3>
            <nav class="sidebar-nav">
                <button onclick="filterSelection('all')" class="nav-box">All Kits</button>
                <button onclick="filterSelection('painting')" class="nav-box">Painting</button>
                <button onclick="filterSelection('embroidery')" class="nav-box">Embroidery</button>
                <button onclick="filterSelection('knitting')" class="nav-box">Knitting</button>
            </nav>
        </aside>

        <section class="gallery-content">
            <div id="painting" class="filter-section"><h2 class="gallery-title">Painting</h2><div class="product-grid"><div class="product-card"></div></div></div>
            <div id="embroidery" class="filter-section"><h2 class="gallery-title">Embroidery</h2><div class="product-grid"><div class="product-card"></div></div></div>
            <div id="knitting" class="filter-section"><h2 class="gallery-title">Knitting</h2><div class="product-grid"><div class="product-card"></div></div></div>
        </section>
    </main>

    <script>
        function filterSelection(c) {
            const sections = document.querySelectorAll('.filter-section');
            sections.forEach(s => s.style.display = (c === 'all' || s.id === c) ? 'block' : 'none');
        }
    </script>
</body>
</html>
